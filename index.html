<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Busca y Compra</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Busca y Compra">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f7f9fc; color: #2d3748;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        #lockScreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #1a365d; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            color: white; padding: 20px; box-sizing: border-box;
        }
        .lock-box {
            background: white; padding: 30px; border-radius: 16px; color: #2d3748;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-width: 320px; width: 100%; text-align: center;
        }
        .lock-box h2 { margin-top: 0; color: #1a365d; }
        .lock-box input {
            width: 100%; padding: 12px; font-size: 20px; text-align: center;
            border: 2px solid #cbd5e0; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box;
        }
        .lock-box button {
            width: 100%; background-color: #48bb78; color: white; padding: 12px;
            font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer;
        }
        #appContent {
            display: none; width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; text-align: center;
        }
        .logo-area { margin-top: 40px; margin-bottom: 30px; }
        .logo-title { font-size: 32px; font-weight: bold; color: #1a365d; margin: 0; }
        .subtitle { font-size: 16px; color: #718096; margin-top: 8px; }
        .search-box {
            background: white; border-radius: 16px; padding: 25px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); margin-bottom: 25px;
        }
        .search-label { font-size: 20px; font-weight: 600; display: block; margin-bottom: 15px; color: #2b6cb0; }
        input[type="text"] {
            width: 100%; font-size: 22px; padding: 15px; border: 2px solid #cbd5e0;
            border-radius: 10px; box-sizing: border-box; margin-bottom: 20px; outline: none; text-align: center;
        }
        input[type="text"]:focus { border-color: #3182ce; }
        .btn-main {
            width: 100%; background-color: #3182ce; color: white; font-size: 20px;
            font-weight: bold; padding: 18px; border: none; border-radius: 12px; cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(49, 130, 206, 0.3);
        }
        .results-area { margin-top: 20px; text-align: left; }
        .card {
            background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); border-left: 5px solid #48bb78;
        }
        .card h3 { margin: 0 0 5px 0; font-size: 18px; color: #1a365d; }
        .card p { margin: 0; font-size: 15px; color: #4a5568; }
        .card .price { font-size: 18px; font-weight: bold; color: #2f855a; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="lockScreen">
        <div class="lock-box">
            <h2>Acceso Privado</h2>
            <p>Introduce la clave para probar la app:</p>
            <input type="password" id="pinInput" placeholder="••••">
            <button onclick="verificarClave()">ENTRAR</button>
            <p id="errorMsg" style="color:red; font-weight:bold; display:none; margin-top:10px;">Clave incorrecta</p>
        </div>
    </div>

    <div id="appContent">
        <div class="logo-area">
            <h1 class="logo-title">Busca y Compra</h1>
            <div class="subtitle">Tu comercio local, más cerca que nunca</div>
        </div>

        <div class="search-box">
            <label class="search-label" for="productInput">¿Qué necesitas comprar hoy?</label>
            <input type="text" id="productInput" placeholder="Ej. Motosierra, Pan..." autocomplete="off">
            <button class="btn-main" onclick="buscarProducto()">🔍 BUSCAR TIENDAS CERCA</button>
        </div>

        <div id="results" class="results-area"></div>
    </div>

    <script {nonce}>
        const CLAVE_CORRECTA = "1234"; 

        function verificarClave() {
            const input = document.getElementById('pinInput').value;
            if (input === CLAVE_CORRECTA) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function buscarProducto() {
            const query = document.getElementById('productInput').value.trim().toLowerCase();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (!query) {
                resultsDiv.innerHTML = '<p style="text-align:center; color:#e53e3e; font-weight:bold;">Por favor, escribe algo.</p>';
                return;
            }

            const mockStores = [
                { name: "Ferretería García", product: "motosierra", detail: "Modelo Stihl MS 170. Disponible en tienda.", price: "199,00 €", dist: "A 450 metros" },
                { name: "Suministros Hércules", product: "motosierra", detail: "Husqvarna a batería.", price: "245,00 €", dist: "A 1,2 km" },
                { name: "Panadería Central", product: "pan", detail: "Barra artesana recién horneada.", price: "1,10 €", dist: "A 150 metros" }
            ];

            const filtrados = mockStores.filter(store => store.product.includes(query));

            if (filtrados.length === 0) {
                resultsDiv.innerHTML = '<div class="card" style="border-left-color: #ed8936;"><h3>Sin stock registrado</h3><p>Búsqueda transmitida a comercios locales.</p></div>';
            } else {
                filtrados.forEach(store => {
                    resultsDiv.innerHTML += `<div class="card"><h3>${store.name}</h3><p>${store.detail}</p><p style="color:#718096; font-size:13px;">📍 ${store.dist}</p><div class="price">${store.price}</div></div>`;
                });
            }
        }
    </script>
</body>
</html>
