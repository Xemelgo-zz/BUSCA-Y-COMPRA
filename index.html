<script>
(function(){
  "use strict";

  const nav = document.getElementById('siteNav');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 12));

  /* ================= UBICACIÓN REAL ================= */
  let userCoords = null; 
  const geoStatusEl = document.getElementById('geoStatus');
  const searchBtn = document.getElementById('searchBtn');

  function setLocation(lat, lon, label){
    userCoords = { lat, lon };
    geoStatusEl.textContent = label;
    geoStatusEl.classList.add('ok');
    geoStatusEl.classList.remove('err');
    document.getElementById('radarHint').style.display = 'none';
    searchBtn.disabled = false;
  }

  document.getElementById('heroLocate').addEventListener('click', () => {
    if (!navigator.geolocation){
      geoStatusEl.textContent = "Tu navegador no admite geolocalización. Prueba a escribir tu dirección.";
      geoStatusEl.classList.add('err');
      return;
    }
    geoStatusEl.textContent = "Localizando…";
    geoStatusEl.classList.remove('err','ok');
    navigator.geolocation.getCurrentPosition(
      pos => setLocation(pos.coords.latitude, pos.coords.longitude, "Ubicación GPS activada · " + pos.coords.latitude.toFixed(4) + ", " + pos.coords.longitude.toFixed(4)),
      () => {
        geoStatusEl.textContent = "No se pudo acceder al GPS. Prueba a escribir tu dirección abajo.";
        geoStatusEl.classList.add('err');
      },
      { enableHighAccuracy:true, timeout:8000 }
    );
  });

  document.getElementById('addrForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const q = document.getElementById('addrInput').value.trim();
    if (!q) return;
    geoStatusEl.textContent = "Buscando esa dirección…";
    geoStatusEl.classList.remove('err','ok');
    try{
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`);
      const data = await res.json();
      if (!data.length){
        geoStatusEl.textContent = "No encontramos esa dirección. Prueba a ser más concreto (ciudad + calle).";
        geoStatusEl.classList.add('err');
        return;
      }
      setLocation(parseFloat(data[0].lat), parseFloat(data[0].lon), "Ubicación fijada · " + (data[0].display_name.split(',').slice(0,2).join(',')));
    }catch(err){
      geoStatusEl.textContent = "Error al buscar la dirección. Inténtalo de nuevo.";
      geoStatusEl.classList.add('err');
    }
  });

  /* ================= GEOMETRÍA REAL ================= */
  function haversineKm(lat1, lon1, lat2, lon2){
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI/180;
    const dLon = (lon2 - lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  function normalize(str){ return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }

  /* ================= MAPA PRODUCTO → CATEGORÍA OSM ================= */
  const CATEGORY_MAP = [
    { label:'Electrónica', keywords:['auricular','auriculares','cascos','altavoz','altavoces','cargador','movil','móvil','telefono','teléfono','portatil','portátil','ordenador','tablet','television','televisor','electronica','electrónica'], tags:[['shop','electronics'],['shop','mobile_phone'],['shop','computer']] },
    { label:'Bricolaje', keywords:['taladro','tornillo','tornillos','martillo','pintura','bricolaje','herramienta','herramientas'], tags:[['shop','doityourself'],['shop','hardware']] },
    { label:'Alimentación', keywords:['arroz','aceite','cafe','café','leche','pan','comida','alimentacion','alimentación','supermercado','pasta','conserva','fruta','verdura'], tags:[['shop','supermarket'],['shop','convenience'],['shop','grocery'],['shop','bakery'],['shop','greengrocer']] },
    { label:'Mascotas', keywords:['pienso','mascota','mascotas','gato','perro','collar'], tags:[['shop','pet']] },
    { label:'Bebé', keywords:['pañal','panal','bebe','bebé','biberon','biberón'], tags:[['shop','baby_goods']] },
    { label:'Deporte', keywords:['zapatilla','zapatillas','balon','balón','running','deporte','bicicleta'], tags:[['shop','sports'],['shop','bicycle']] },
    { label:'Hogar', keywords:['sarten','sartén','termo','cafetera','bombilla','hogar','vajilla','menaje','muebles'], tags:[['shop','houseware'],['shop','department_store'],['shop','furniture']] },
    { label:'Ropa', keywords:['ropa','camiseta','pantalon','pantalón','zapato','zapatos','moda'], tags:[['shop','clothes'],['shop','shoes']] },
    { label:'Librería', keywords:['libro','libros','libreria','librería','papeleria','papelería'], tags:[['shop','books'],['shop','stationery']] },
    { label:'Farmacia', keywords:['farmacia','medicamento','medicina'], tags:[['amenity','pharmacy']] },
  ];

  function matchCategory(query){
    const q = normalize(query);
    for (const cat of CATEGORY_MAP){
      if (cat.keywords.some(k => q.includes(normalize(k)))) return cat;
    }
    return null;
  }

  /* ================= OVERPASS (OpenStreetMap) — BÚSQUEDA LIBRE TOTAL ================= */
  const OVERPASS_ENDPOINTS = [
    'https://overpass-api.de/api/interpreter',
    'https://overpass.kumi.systems/api/interpreter'
  ];
  const RADIUS_M = 6000;

  function buildOverpassQuery(lat, lon, category, freeText) {
    const parts = [];
    
    // 1. Si coincide con una categoría mapeada arriba, la priorizamos
    if (category) {
      category.tags.forEach(([k,v]) => parts.push(`node["${k}"="${v}"](around:${RADIUS_M},${lat},${lon});`));
    }
    
    // 2. Si no es categoría o es texto libre, buscamos el término en múltiples propiedades de OSM
    const esc = freeText.replace(/["\\]/g,'').trim();
    if (esc) {
      // Busca si el término coincide parcial o totalmente con el NOMBRE de la tienda
      parts.push(`node["shop"]["name"~"${esc}",i](around:${RADIUS_M},${lat},${lon});`);
      parts.push(`node["amenity"]["name"~"${esc}",i](around:${RADIUS_M},${lat},${lon});`);
      
      // BÚSQUEDA MEJORADA: Busca si el término coincide con el TIPO de tienda (ej: "supermarket", "bakery", "clothes")
      parts.push(`node["shop"~"${esc}",i](around:${RADIUS_M},${lat},${lon});`);
      parts.push(`node["amenity"~"${esc}",i](around:${RADIUS_M},${lat},${lon});`);
    }
    
    // 3. Fallback defensivo: Si la caja está vacía o falló el filtro, trae cualquier comercio
    if (!parts.length) {
      parts.push(`node["shop"](around:${RADIUS_M},${lat},${lon});`);
      parts.push(`node["amenity"~"pharmacy|restaurant|cafe|fast_food"](around:${RADIUS_M},${lat},${lon});`);
    }
    
    return `[out:json][timeout:25];(${parts.join('')});out body;`;
  }

  async function queryOverpass(qlQuery){
    let lastErr;
    for (const endpoint of OVERPASS_ENDPOINTS){
      try{
        const res = await fetch(endpoint, { method:'POST', body:'data=' + encodeURIComponent(qlQuery) });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
      }catch(err){ lastErr = err; }
    }
    throw lastErr || new Error('overpass_unreachable');
  }

  function shopLabel(tags){
    if (tags.shop) return tags.shop.replace(/_/g,' ');
    if (tags.amenity) return tags.amenity.replace(/_/g,' ');
    return 'Comercio';
  }
  function shopAddress(tags){
    const parts = [tags['addr:street'], tags['addr:housenumber'], tags['addr:city']].filter(Boolean);
    return parts.length ? parts.join(' ') : null;
  }

  /* ================= BÚSQUEDA Y RENDER ================= */
  const resultsArea = document.getElementById('resultsArea');
  const resultsBar = document.getElementById('resultsBar');
  const resultsCount = document.getElementById('resultsCount');
  const sortButtons = document.querySelectorAll('.sort-toggle button');
  let currentShops = [];
  let currentSort = 'distance';

  function showStatus(html, cls){
    resultsBar.style.display = 'none';
    resultsArea.innerHTML = `<div class="status-line ${cls||''}">${html}</div>`;
  }

  function renderShops(){
    if (currentShops.length === 0){
      resultsBar.style.display = 'none';
      resultsArea.innerHTML = `
        <div class="empty-state">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="margin:0 auto;">
            <circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          No hay comercios que coincidan con tu búsqueda en OpenStreetMap dentro de ${(RADIUS_M/1000)} km.
        </div>`;
      return;
    }
    const sorted = [...currentShops].sort((a,b) =>
      currentSort === 'distance' ? a.distance - b.distance : a.name.localeCompare(b.name)
    );
    resultsBar.style.display = 'flex';
    resultsCount.innerHTML = `<strong>${sorted.length}</strong> comercios reales encontrados`;
    resultsArea.innerHTML = `<div class="results-grid">${sorted.map(s => `
      <div class="card">
        <div class="cat">${s.category}</div>
        <div class="pname">${s.name}</div>
        ${s.address ? `<div class="addr">${s.address}</div>` : ''}
        <hr>
        <div class="meta-row">
          <span class="dist">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle>
            </svg>
            ${s.distance.toFixed(1)} km
          </span>
          <a class="maplink" target="_blank" rel="noopener" href="https://www.openstreetmap.org/?mlat=${s.lat}&mlon=${s.lon}#map=18/${s.lat}/${s.lon}">Ver en el mapa →</a>
        </div>
      </div>`).join('')}</div>`;
  }

  document.getElementById('searchForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const q = document.getElementById('searchInput').value.trim();
    if (!q) return;
    if (!userCoords){
      showStatus('Primero comparte tu ubicación (GPS o dirección) arriba.', 'err');
      return;
    }
    showStatus('Buscando comercios cercanos…', 'loading');
    const category = matchCategory(q);
    
    // Pasamos el string original 'q' al query builder para que analice los tags internos de OSM de forma libre
    const ql = buildOverpassQuery(userCoords.lat, userCoords.lon, category, q);
    
    try{
      const data = await queryOverpass(ql);
      const seen = new Set();
      currentShops = (data.elements || [])
        .filter(el => el.tags && el.tags.name && !seen.has(el.id) && seen.add(el.id))
        .map(el => ({
          id: el.id,
          name: el.tags.name,
          category: category ? category.label : shopLabel(el.tags),
          address: shopAddress(el.tags),
          lat: el.lat, lon: el.lon,
          distance: haversineKm(userCoords.lat, userCoords.lon, el.lat, el.lon)
        }));
      renderShops();
      spawnRadarBlips(currentShops);
    }catch(err){
      showStatus('No se pudo consultar OpenStreetMap ahora mismo. Espera unos segundos y vuelve a intentarlo.', 'err');
    }
  });

  sortButtons.forEach(btn => btn.addEventListener('click', () => {
    sortButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    renderShops();
  }));

  /* ================= RADAR HERO ================= */
  function spawnRadarBlips(shops){
    const box = document.getElementById('radarBox');
    box.querySelectorAll('.radar-blip').forEach(b => b.remove());
    const sample = [...shops].sort((a,b)=>a.distance-b.distance).slice(0,4);
    sample.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'radar-blip';
      const angle = Math.random()*360;
      const radius = 20 + Math.random()*32;
      const x = 50 + radius*Math.cos(angle*Math.PI/180);
      const y = 50 + radius*Math.sin(angle*Math.PI/180);
      el.style.left = x + '%'; el.style.top = y + '%';
      el.style.animationDelay = (i*0.35 + 0.15) + 's';
      el.innerHTML = `<span class="pip"></span>${s.name} · ${s.distance.toFixed(1)}km`;
      box.appendChild(el);
    });
  }

})();
</script>
