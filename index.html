<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Chollos Globales - El Más Barato del Mundo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }
        body {
            background-color: #f0f3f6;
            color: #1a1a1a;
        }
        header {
            background: linear-gradient(135deg, #1f2937, #111827);
            padding: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .logo span {
            color: #10b981;
        }
        .search-container {
            display: flex;
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            border-radius: 50px;
            overflow: hidden;
            background: white;
            padding: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .search-input {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            outline: none;
            border-radius: 50px 0 0 50px;
        }
        .search-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 0 26px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            transition: background 0.2s;
        }
        .search-btn:hover {
            background-color: #059669;
        }
        main {
            max-width: 850px;
            margin: 30px auto;
            padding: 0 15px;
        }
        .status {
            text-align: center;
            color: #6b7280;
            font-size: 15px;
            margin-top: 40px;
            line-height: 1.5;
        }
        .deal-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
        }
        .deal-header {
            margin-bottom: 15px;
        }
        .deal-tag {
            background-color: #fee2e2;
            color: #dc2626;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .deal-title {
            font-size: 20px;
            color: #111827;
            font-weight: 800;
        }
        .grid-platforms {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        @media(min-width: 550px) {
            .grid-platforms {
                grid-template-columns: 1fr 1fr;
            }
        }
        .market-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            border-radius: 8px;
            transition: transform 0.15s, box-shadow 0.15s;
            color: white;
        }
        .market-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        /* Colores corporativos de los mayores mercados low-cost */
        .btn-google { background-color: #4285f4; }
        .btn-aliexpress { background-color: #ff4747; }
        .btn-ebay { background-color: #e53238; }
        .btn-chollos { background-color: #f59e0b; }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #10b981;
            animation: spin 0.8s linear infinite;
            margin: 30px auto;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">🚀 Chollos<span>Mundiales</span></div>
        <div class="search-container">
            <input type="text" id="query" class="search-input" placeholder="¿Qué buscas? Encontraremos el precio mínimo del planeta...">
            <button class="search-btn" id="searchBtn">Buscar</button>
        </div>
    </header>

    <main>
        <div id="spinner" class="spinner"></div>
        <div id="resultsContainer">
            <div class="status">
                <strong>Rastreador de precios mínimos globales activo.</strong><br>
                Introduce cualquier marca, modelo o producto para forzar la búsqueda en todo el mercado internacional.
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('query');
        const btn = document.getElementById('searchBtn');
        const container = document.getElementById('resultsContainer');
        const spinner = document.getElementById('spinner');

        function buscarMasBarato() {
            const termino = input.value.trim();
            if (!termino) return;

            // Interfaz de carga reactiva
            container.innerHTML = "";
            spinner.style.display = "block";

            setTimeout(() => {
                spinner.style.display = "none";

                // Enlaces exactos a los comparadores de precios mínimos globales en tiempo real
                const urlGoogleShopping = `https://www.google.com/search?tbm=shop&q=${encodeURIComponent(termino)}+barato`;
                const urlAliExpress = `https://es.aliexpress.com/w/wholesale-.html?SearchText=${encodeURIComponent(termino)}&sortType=price_asc`;
                const urlEbay = `https://www.ebay.es/sch/i.html?_nkw=${encodeURIComponent(termino)}&_sop=15`; // Ordenado por precio + envío más bajo
                const urlChollometro = `https://www.chollometro.com/buscar?q=${encodeURIComponent(termino)}`;

                const card = document.createElement('div');
                card.className = 'deal-card';
                card.innerHTML = `
                    <div class="deal-header">
                        <span class="deal-tag">🔥 PRECIO MÍNIMO ASEGURADO</span>
                        <h2 class="deal-title">Búsqueda global: "${termino}"</h2>
                        <p style="font-size: 14px; color: #4b5563; margin-top: 6px;">Hemos interceptado los motores de liquidación del mercado. Elige una plataforma para ver el coste real e inmediato:</p>
                    </div>
                    
                    <div class="grid-platforms">
                        <a href="${urlGoogleShopping}" target="_blank" class="market-btn btn-google">
                            <span>🌍 Comparador Google Shopping</span>
                            <span>Ver Precios ↗</span>
                        </a>
                        <a href="${urlAliExpress}" target="_blank" class="market-btn btn-aliexpress">
                            <span>🇨🇳 AliExpress (Precio Fábrica Mínimo)</span>
                            <span>Ver Precios ↗</span>
                        </a>
                        <a href="${urlEbay}" target="_blank" class="market-btn btn-ebay">
                            <span>📦 eBay Global (Outlet y Subastas)</span>
                            <span>Ver Precios ↗</span>
                        </a>
                        <a href="${urlChollometro}" target="_blank" class="market-btn btn-chollos">
                            <span>🏷️ Cupones y Errores de Precio</span>
                            <span>Ver Chollos ↗</span>
                        </a>
                    </div>
                `;
                container.appendChild(card);
            }, 400); // Pequeña latencia para simular el rastreo real
        }

        btn.addEventListener('click', buscarMasBarato);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') buscarMasBarato(); });
    </script>
</body>
</html>
