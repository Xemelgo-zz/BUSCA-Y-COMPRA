<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Busca y Compra Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BuscaCompra">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-gradient: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
            --green-glow: #10b981;
        }
        
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Arial, sans-serif;
            background: var(--bg-gradient); color: #f8fafc;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* PANTALLA DE PROTECCIÓN */
        #lockScreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-gradient); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; padding: 20px; box-sizing: border-box;
        }
        .lock-box {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 24px; border: 1px solid var(--glass-border);
            max-width: 340px; width: 100%; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .lock-box input {
            width: 100%; padding: 16px; font-size: 24px; text-align: center; letter-spacing: 6px;
            border: 1px solid var(--glass-border); border-radius: 14px; margin-bottom: 20px; 
            box-sizing: border-box; background: rgba(0,0,0,0.2); color: white; outline: none;
        }
        .lock-box button {
            width: 100%; background: var(--accent-gradient); color: white; padding: 16px;
            font-size: 16px; font-weight: 600; border: none; border-radius: 14px; cursor: pointer;
        }

        /* CONTENIDO PRINCIPAL */
        #appContent {
            display: none; width: 100%; max-width: 460px; padding: 20px; box-sizing: border-box;
        }
        
        .logo-area { text-align: center; margin-top: 20px; margin-bottom: 30px; }
        .radar-icon {
            width: 60px; height: 60px; background: var(--accent-gradient); border-radius: 50%;
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 24px;
            position: relative; box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
        }
        .logo-title { font-size: 30px; font-weight: 800; margin: 0; background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 14px; color: #94a3b8; margin-top: 4px; }

        .search-box {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 24px; padding: 24px; border: 1px solid var(--glass-border); margin-bottom: 20px;
        }
        
        input[type="text"] {
            width: 100%; font-size: 17px; padding: 16px; border: 1px solid var(--glass-border);
            border-radius: 16px; box-sizing: border-box; outline: none;
            background: rgba(15, 23, 42, 0.6); color: white; margin-bottom: 15px;
        }
        
        .btn-main {
            width: 100%; background: var(--accent-gradient); color: white; font-size: 16px;
            font-weight: 600; padding: 16px; border: none; border-radius: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* ZONA DE RESULTADOS INTEGRADA */
        .results-container { margin-top: 10px; }
        
        .loader {
            display: none; text-align: center; padding: 30px; color: #94a3b8; font-size: 15px;
        }
        .spinner {
            width: 30px; height: 30px; border: 3px solid var(--glass-border); border-top-color: #06b6d4;
            border-radius: 50%; margin: 0 auto 15px; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 20px; margin-bottom: 15px; display: flex;
            flex-direction: column; gap: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 18px; font-weight: 700; color: white; margin: 0; }
        
        .badge-open {
            background: rgba(16, 185, 129, 0.15); color: var(--green-glow);
            padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.3); display: flex; align-items: center; gap: 4px;
        }
        .card-meta { font-size: 14px; color: #94a3b8; display: flex; gap: 15px; }
        .card-address { font-size: 13px; color: #cbd5e1; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- PROTECTION SCREEN -->
    <div id="lockScreen">
        <div class="lock-box">
            <div style="font-size: 32px; margin-bottom: 10px;">🛡️</div>
            <h2>Acceso Encriptado</h2>
            <input type="password" id="pinInput" placeholder="••••" inputmode="numeric">
            <button onclick="verificarClave()">Desbloquear App</button>
            <p id="errorMsg" style="color:#f87171; display:none; margin-top:15px; font-weight:600;">⚠️ Clave incorrecta</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="appContent">
        <div class="logo-area">
            <div class="radar-icon">📡</div>
            <h1 class="logo-title">Busca y Compra</h1>
            <div class="subtitle">Buscador en vivo • Solo comercios abiertos</div>
        </div>

        <div class="search-box">
            <input type="text" id="productInput" placeholder="Ej. súper, farmacia, ferretería..." autocomplete="off">
            <button class="btn-main" onclick="ejecutarBusquedaInterna()">
                <span>🔍</span> Escanear Alrededores
            </button>
        </div>

        <!-- RESULTADOS EN LA MISMA PÁGINA -->
        <div class="results-container">
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p>Consultando base de datos satelital...</p>
            </div>
            <div id="listaResultados"></div>
        </div>
    </div>

    <script {nonce}>
        const CLAVE_CORRECTA = "1234"; 

        function verificarClave() {
            const input = document.getElementById('pinInput').value;
            if (input === CLAVE_CORRECTA) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('appContent').style.display = 'block';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('pinInput').value = '';
            }
        }

        // Base de datos inteligente integrada (Simula las respuestas de Google en tiempo real)
        const baseDatosGoogle = [
            { tags: ['super', 'supermercado', 'comida', 'alimentacion'], nombre: 'Supermercado Express 24h', distancia: '350m', rating: '⭐ 4.5', direccion: 'Av. Principal, Nº 42' },
            { tags: ['pan', 'panaderia', 'desayuno'], nombre: 'Panadería Central Obrera', distancia: '120m', rating: '⭐ 4.8', direccion: 'Calle Mayor, Bl. 3' },
            { tags: ['ferreteria', 'herramientas', 'tornillos'], nombre: 'Ferretería El Tornillo Abierto', distancia: '800m', rating: '⭐ 4.2', direccion: 'Polígono Industrial, Nave 4' },
            { tags: ['farmacia', 'medicamentos', 'medico'], nombre: 'Farmacia de Guardia Ldo. Sanz', distancia: '500m', rating: '⭐ 4.7', direccion: 'Plaza del Reloj, Nº 7' },
            { tags: ['chino', 'restaurante', 'cena'], nombre: 'Gran Muralla Oriental', distancia: '1.2km', rating: '⭐ 4.4', direccion: 'Av. de la Constitución, 18' }
        ];

        function ejecutarBusquedaInterna() {
            const query = document.getElementById('productInput').value.toLowerCase().trim();
            const loader = document.getElementById('loader');
            const lista = document.getElementById('listaResultados');
            
            if (!query) {
                alert('Escribe qué estás buscando para escanear.');
                return;
            }

            // Limpiamos pantalla y encendemos el motor de carga
            lista.innerHTML = '';
            loader.style.display = 'block';

            // Simulamos el retraso de respuesta de Google (1.2 segundos de carga premium)
            setTimeout(() => {
                loader.style.display = 'none';
                
                // Filtramos la base de datos buscando coincidencia
                const filtrados = baseDatosGoogle.filter(local => 
                    local.tags.some(tag => query.includes(tag)) || local.nombre.toLowerCase().includes(query)
                );

                if (filtrados.length === 0) {
                    lista.innerHTML = `
                        <div class="card" style="text-align:center; color:#94a3b8;">
                            <p style="font-size:30px; margin:0;">🏪</p>
                            <p style="font-weight:600; margin:5px 0 0 0;">Ningún local de "${query}" abierto ahora mismo a tu alrededor.</p>
                        </div>`;
                    return;
                }

                // Pintamos las tarjetas premium integradas
                filtrados.forEach(local => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-header">
                            <h3 class="card-title">${local.nombre}</h3>
                            <span class="badge-open">● Abierto Ahora</span>
                        </div>
                        <div class="card-meta">
                            <span>📍 A ${local.distancia}</span>
                            <span>${local.rating}</span>
                        </div>
                        <div class="card-address">🗺️ ${local.direccion}</div>
                    `;
                    lista.appendChild(card);
                });

            }, 1200);
        }
    </script>
</body>
</html>
