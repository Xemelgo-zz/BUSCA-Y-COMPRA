<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BuscaCompra S.O.S</title>
    <style>
        body {
            margin: 0; padding: 20px;
            background-color: #090d16; color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
        }
        h1 { font-size: 24px; color: #ff5722; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
        
        /* Contenedor de botones */
        .grid-botones {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }
        .tarjeta-btn {
            background-color: #1e293b; border: 1px solid #334155;
            border-radius: 16px; padding: 20px 10px; cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }
        .tarjeta-btn:active { transform: scale(0.95); background-color: #334155; }
        .emoji { font-size: 36px; display: block; margin-bottom: 10px; }
        .texto { font-size: 15px; font-weight: bold; display: block; color: #f8fafc; }
        .subtexto { font-size: 11px; color: #94a3b8; display: block; margin-top: 4px; }

        /* Buscador manual por si acaso */
        .buscador-caja {
            margin-top: 30px; background: #1e293b; border: 1px solid #ff5722;
            border-radius: 25px; padding: 6px 6px 6px 16px; display: flex; align-items: center;
        }
        .buscador-caja input {
            flex: 1; background: none; border: none; color: white; font-size: 16px; outline: none;
        }
        .buscador-caja button {
            background: #ff5722; border: none; width: 38px; height: 38px; border-radius: 50%; color: white; cursor: pointer; font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>🏪 BuscaCompra S.O.S</h1>
    <p>Capa de emergencia automática para madrugada</p>

    <!-- BOTONES DIRECTOS FÁCILES -->
    <div class="grid-botones">
        <div class="tarjeta-btn" onclick="abrirMapaInmediato('gasolinera 24 horas')">
            <span class="emoji">⛽</span>
            <span class="texto">Gasolineras 24h</span>
            <span class="subtexto">Hielo, bebida, snacks</span>
        </div>

        <div class="tarjeta-btn" onclick="abrirMapaInmediato('tienda de conveniencia abierta ahora')">
            <span class="emoji">🏪</span>
            <span class="texto">Tiendas 24h</span>
            <span class="subtexto">Alimentos y básicos</span>
        </div>

        <div class="tarjeta-btn" onclick="abrirMapaInmediato('farmacia de guardia abierta ahora')">
            <span class="emoji">💊</span>
            <span class="texto">Farmacia Guardia</span>
            <span class="subtexto">Medicamentos urgentes</span>
        </div>

        <div class="tarjeta-btn" onclick="abrirMapaInmediato('bazar abierto ahora')">
            <span class="emoji">🔌</span>
            <span class="texto">Bazar / Chinos</span>
            <span class="subtexto">Pilas, cargadores, cables</span>
        </div>
    </div>

    <!-- BUSCADOR POR SI QUIEREN ALGO MÁS SPECÍFICO -->
    <div class="buscador-caja">
        <input type="text" id="inputManual" placeholder="¿Buscas otra cosa? Ej: Mc Donalds">
        <button onclick="buscarManual()">🔍</button>
    </div>

    <script>
        function abrirMapaInmediato(termino) {
            // Detectamos si es iOS (iPhone/iPad) o Android/PC
            const esApple = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            
            // Si es Apple usamos su protocolo nativo; si es Android/PC usamos la URL universal de Google Maps
            const url = esApple 
                ? `maps://?q=${encodeURIComponent(termino)}` 
                : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(termino)}`;
            
            window.location.href = url;
        }

        function buscarManual() {
            const consulta = document.getElementById('inputManual').value.trim();
            if (consulta) {
                // Le añadimos la coletilla mágica para que el mapa filtre los cerrados
                abrirMapaInmediato(consulta + " abierto ahora");
            }
        }
    </script>

</body>
</html>
