<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Sincronizador de Sistemas & Código</title>
    <style>
        :root {
            --bg-main: #0a0e17;
            --bg-card: #131a26;
            --accent-cyan: #06b6d4;
            --accent-purple: #a855f7;
            --text-main: #f8fafc;
            --text-muted: #64748b;
        }

        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-main); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        h1 { font-size: 24px; color: var(--accent-cyan); text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }

        .workspace {
            display: grid; grid-template-columns: 1fr; gap: 20px;
        }

        @media (min-width: 768px) {
            .workspace { grid-template-columns: 1fr 1fr; }
        }

        /* Panel Izquierdo: Entrada de Código */
        .panel-editor {
            background: var(--bg-card); border: 1px solid #1e293b; border-radius: 12px; padding: 16px;
        }
        .panel-title { font-size: 14px; font-weight: bold; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        textarea {
            width: 100%; height: 280px; background: #070a10; color: #38bdf8;
            border: 1px solid #1e293b; border-radius: 8px; padding: 12px;
            font-family: 'Courier New', Courier, monospace; font-size: 14px;
            resize: none; outline: none; box-sizing: border-box;
        }

        /* Panel Derecho: Interfaz Sincronizada */
        .panel-vista {
            background: var(--bg-card); border: 1px solid #1e293b; border-radius: 12px; padding: 16px;
            display: flex; flex-direction: column;
        }

        .arbol-sistema {
            flex: 1; background: #070a10; border-radius: 8px; padding: 12px;
            min-height: 280px; box-sizing: border-box;
        }

        .nodo-bloque {
            background: rgba(6, 182, 212, 0.1); border-left: 4px solid var(--accent-cyan);
            padding: 10px; margin-bottom: 8px; border-radius: 4px;
            animation: fadeIn 0.3s ease;
        }

        .nodo-bloque.funcion { border-left-color: var(--accent-purple); background: rgba(168, 85, 247, 0.1); }
        .nodo-bloque.bucle { border-left-color: #eab308; background: rgba(234, 179, 8, 0.1); }

        .nodo-meta { font-size: 11px; color: var(--text-muted); float: right; margin-top: 2px; }
        .nodo-nombre { font-weight: bold; font-size: 14px; color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <h1>⚡ Quantum Code Synchronizer</h1>
    <div class="subtitle">Escribe o modifica código a la izquierda para ver cómo el sistema lo lee y procesa en tiempo real</div>

    <div class="workspace">
        <!-- ENTRADA DE CÓDIGO -->
        <div class="panel-editor">
            <div class="panel-title">
                <span>Editor de Entrada (JS / Pseudo)</span>
                <span style="color: var(--accent-cyan);">● Sincronizado</span>
            </div>
            <textarea id="editorCodigo" oninput="procesarYSincronizar()">function inicializarSistema() {
    let usuarios = 150;
    for(let i = 0; i < 10; i++) {
        ejecutarProceso();
    }
}

function verificarConexion() {
    let estado = "activo";
}</textarea>
        </div>

        <!-- INTERFAZ COMPRENSIVA -->
        <div class="panel-vista">
            <div class="panel-title">Estructura del Sistema Entendida</div>
            <div id="arbolSistema" class="arbol-sistema">
                <!-- Los componentes analizados se inyectan aquí -->
            </div>
        </div>
    </div>

    <script>
        function procesarYSincronizar() {
            const codigo = document.getElementById('editorCodigo').value;
            const arbol = document.getElementById('arbolSistema');
            arbol.innerHTML = ''; // Limpiar vista anterior

            // Dividimos por líneas para simular el análisis secuencial (Lexer)
            const lineas = codigo.split('\n');

            lineas.forEach((linea, index) => {
                const numLinea = index + 1;
                const textoLimpio = linea.trim();

                // 1. Detectar Funciones
                if (textoLimpio.startsWith('function ') || textoLimpio.includes('=>')) {
                    const nombreMatch = textoLimpio.match(/function\s+([a-zA-Z0-9_]+)/);
                    const nombre = nombreMatch ? nombreMatch[1] + '()' : 'Función Anónima';
                    
                    crearNodoVisual('Módulo / Función', nombre, `Línea ${numLinea}`, 'funcion');
                }
                
                // 2. Detectar Bucles / Ciclos repetitivos
                else if (textoLimpio.startsWith('for') || textoLimpio.startsWith('while')) {
                    crearNodoVisual('Bucle de Repetición', textoLimpio.split('{')[0], `Línea ${numLinea}`, 'bucle');
                }
                
                // 3. Detectar Declaración de Datos / Variables
                else if (textoLimpio.startsWith('let ') || textoLimpio.startsWith('const ') || textoLimpio.startsWith('var ')) {
                    const variable = textoLimpio.replace(';', '');
                    crearNodoVisual('Asignación de Memoria', variable, `Línea ${numLinea}`, 'variable');
                }
            });

            if (arbol.innerHTML === '') {
                arbol.innerHTML = '<div style="color: var(--text-muted); text-align:center; padding-top:100px; font-size:14px;">Escribe estructuras como funciones, bucles o variables para sincronizar el sistema...</div>';
            }
        }

        function crearNodoVisual(tipo, descripcion, tracking, clase) {
            const arbol = document.getElementById('arbolSistema');
            const div = document.createElement('div');
            div.className = `nodo-bloque ${clase}`;
            
            div.innerHTML = `
                <span class="nodo-meta">${tracking}</span>
                <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: bold;">${tipo}</div>
                <div class="nodo-nombre">${descripcion}</div>
            `;
            arbol.appendChild(div);
        }

        // Ejecutar análisis inicial al cargar la página
        window.onload = procesarYSincronizar;
    </script>
</body>
</html>
