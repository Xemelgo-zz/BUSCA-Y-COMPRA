<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Busca y Compra Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #1e293b;
            --accent-orange: #ff5722;
            --accent-yellow: #facc15;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --green-glow: #10b981;
        }
        
        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-main); color: var(--text-main);
            padding-bottom: 80px; box-sizing: border-box;
        }

        /* HEADER & SEARCH BAR */
        .app-header {
            position: sticky; top: 0; background: rgba(11, 15, 25, 0.9);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 100; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .brand-name { font-size: 22px; font-weight: 800; color: var(--accent-orange); letter-spacing: -0.5px; }
        
        .search-container {
            display: flex; background: #1e293b; border-radius: 25px; padding: 4px 6px 4px 16px;
            align-items: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .search-container input {
            flex: 1; background: none; border: none; color: white; font-size: 15px; outline: none; padding: 8px 0;
        }
        .search-btn {
            background: var(--accent-orange); border: none; width: 36px; height: 36px; 
            border-radius: 50%; color: white; cursor: pointer; font-size: 14px;
        }

        /* TABS */
        .tabs-nav { display: flex; gap: 20px; overflow-x: auto; padding: 8px 16px; white-space: nowrap; font-size: 14px; }
        .tab-item { color: var(--text-muted); font-weight: 500; }
        .tab-item.active { color: var(--accent-orange); font-weight: 700; border-bottom: 2px solid var(--accent-orange); }

        /* BANNER */
        .promo-banner {
            background: linear-gradient(135deg, #111827 0%, #080711 100%);
            margin: 12px 16px; padding: 16px; border-radius: 16px; border: 1px solid rgba(255, 87, 34, 0.2);
        }
        .promo-banner h3 { margin: 0; font-size: 16px; color: var(--accent-orange); }
        .promo-banner p { margin: 4px 0 0; font-size: 12px; color: var(--text-muted); }

        /* SECCIÓN PRODUCTOS MUESTRA */
        .section-title { font-size: 17px; font-weight: 700; padding: 8px 16px; margin: 0; }
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px 16px; }
        .product-card { background: var(--bg-card); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
        .product-img-box { background: #2d3748; width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .product-info { padding: 10px; }
        .product-name { font-size: 13px; margin: 0 0 4px 0; color: #cbd5e1; }
        .current-price { font-size: 15px; font-weight: 700; color: var(--accent-orange); }

        /* PANEL DE RESULTADOS INTEGRADO */
        .results-overlay { display: none; background: #111827; padding: 16px; margin: 12px 16px; border-radius: 16px; border: 2px solid #ff5722; }
        .loader { text-align: center; padding: 20px; color: var(--text-muted); }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent-orange); border-radius: 50%; margin: 0 auto 10px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .shop-card { background: #1e293b; border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 4px solid var(--green-glow); }
        .shop-header { display: flex; justify-content: space-between; align-items: center; }
        .shop-title { font-size: 15px; font-weight: 700; margin: 0; color: white; }
        .badge-open { background: rgba(16, 185, 129, 0.2); color: var(--green-glow); padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }

        /* NAVBAR INFERIOR */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; display: grid; grid-template-columns: repeat(4, 1fr); height: 60px; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-tab { display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-muted); font-size: 11px; }
        .nav-tab.active { color: var(--accent-orange); }
    </nav>

    <header class="app-header">
        <div class="header-top"><span class="brand-name">BuscaCompra 🏪</span></div>
        <div class="search-container">
            <input type="text" id="productSearchInput" placeholder="¿Qué necesitas con urgencia ahora?">
            <button class="search-btn" onclick="ejecutarRadarUrgente()">🔍</button>
        </div>
    </header>

    <nav class="tabs-nav">
        <span class="tab-item active">Buscador por Cercanía Real</span>
    </nav>

    <!-- ZONA GANCHO DE RESULTADOS DE GEOLOCALIZACIÓN -->
    <div id="resultsOverlay" class="results-overlay">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <h4 style="margin:0; font-size:14px; color:var(--accent-orange);">📍 LOCALES CERCANOS DETECTADOS</h4>
            <span style="cursor:pointer; font-size:12px; color:var(--text-muted);" onclick="cerrarResultados()">Cerrar ✕</span>
        </div>
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <p id="loaderText" style="margin:0; font-size:13px;">Calculando tiendas físicas en tu rango de GPS...</p>
        </div>
        <div id="listaTiendas"></div>
    </div>

    <div class="promo-banner">
        <h3>🚨 S.O.S Madrugada Activo</h3>
        <p>Buscando automáticamente en gasolineras, tiendas 24h y bazares abiertos en un rango extendido de 10km.</p>
    </div>

    <h3 class="section-title">Productos de Emergencia Disponibles</h3>
    <div class="products-grid">
        <div class="product-card" onclick="autocompletarBusqueda('hielo')">
            <div class="product-img-box">🧊</div>
            <div class="product-info">
                <p class="product-name">Bolsa de Hielo Macizo 2kg</p>
                <span class="current-price">1,80€</span>
            </div>
        </div>
        <div class="product-card" onclick="autocompletarBusqueda('pilas')">
            <div class="product-img-box">🔋</div>
            <div class="product-info">
                <p class="product-name">Pilas Alcalinas AA (Pack 4)</p>
                <span class="current-price">3,45€</span>
            </div>
        </div>
        <div class="product-card" onclick="autocompletarBusqueda('leche')">
            <div class="product-img-box">🥛</div>
            <div class="product-info">
                <p class="product-name">Leche Entera 1L</p>
                <span class="current-price">1,10€</span>
            </div>
        </div>
        <div class="product-card" onclick="autocompletarBusqueda('tiritas')">
            <div class="product-img-box">🩹</div>
            <div class="product-info">
                <p class="product-name">Tiritas Elásticas Impermeables</p>
                <span class="current-price">2,15€</span>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-tab active"><span>🏠 Inicio</span></div>
        <div class="nav-tab"><span>🔍 Radar</span></div>
        <div class="nav-tab"><span>🛒 Cesta</span></div>
        <div class="nav-tab"><span>👤 Perfil</span></div>
    </nav>

    <script {nonce}>
        // Diccionario de categorías infalibles para la madrugada
        const mapeoCategoriasNocturnas = {
            'hielo': ['fuel', 'convenience', 'supermarket'],
            'pan': ['convenience', 'fuel', 'bakery'],
            'leche': ['convenience', 'fuel', 'supermarket'],
            'agua': ['convenience', 'fuel', 'kiosk'],
            'pila': ['convenience', 'fuel', 'hardware'],
            'pilas': ['convenience', 'fuel', 'hardware'],
            'motosierra': ['hardware', 'diy'],
            'tiritas': ['pharmacy', 'convenience']
        };

        function calcularDistanciaMeters(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function autocompletarBusqueda(producto) {
            document.getElementById('productSearchInput').value = producto;
            ejecutarRadarUrgente();
        }

        function cerrarResultados() {
            document.getElementById('resultsOverlay').style.display = 'none';
        }

        function ejecutarRadarUrgente() {
            const inputUser = document.getElementById('productSearchInput').value.trim().toLowerCase();
            const overlay = document.getElementById('resultsOverlay');
            const loader = document.getElementById('loader');
            const lista = document.getElementById('listaTiendas');
            const loaderText = document.getElementById('loaderText');

            if (!inputUser) return;

            overlay.style.display = 'block';
            lista.innerHTML = '';
            loader.style.display = 'block';
            loaderText.innerText = "Consultando nodos GPS vivos...";

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const latUser = position.coords.latitude;
                    const lonUser = position.coords.longitude;

                    // Ampliamos el rango a 10.000 metros (10km) para asegurar captar locales nocturnos abiertos
                    const url = `https://overpass-api.de/api/interpreter?data=[out:json];(node(around:10000,${latUser},${lonUser})[shop];node(around:10000,${latUser},${lonUser})[amenity];);out tags geom;`;

                    fetch(url)
                        .then(res => res.json())
                        .then(data => {
                            loader.style.display = 'none';
                            let tiendasEncontradas = [];
                            const categoriasRelevantes = mapeoCategoriasNocturnas[inputUser] || [inputUser];

                            data.elements.forEach(el => {
                                if (!el.tags || !el.tags.name) return;
                                
                                const name = el.tags.name.toLowerCase();
                                const shop = el.tags.shop || '';
                                const amenity = el.tags.amenity || '';

                                // Verificamos si encaja con el tipo de tienda que buscamos o si el nombre contiene la palabra clave
                                let cumpleFiltro = categoriasRelevantes.some(cat => shop === cat || amenity === cat || name.includes(inputUser));

                                if (cumpleFiltro) {
                                    const distancia = calcularDistanciaMeters(latUser, lonUser, el.lat, el.lon);
                                    tiendasEncontradas.push({
                                        name: el.tags.name,
                                        dist: distancia,
                                        tipo: shop || amenity,
                                        calle: el.tags['addr:street'] ? `${el.tags['addr:street']} ${el.tags['addr:housenumber'] || ''}` : 'Ubicación cercana'
                                    });
                                }
                            });

                            // ORDEN ESTRICTO: El comercio que tengas más cerca de tus pies primero
                            tiendasEncontradas.sort((a,b) => a.dist - b.dist);

                            if(tiendasEncontradas.length === 0) {
                                lista.innerHTML = `<p style="font-size:13px; text-align:center; padding:10px; color:var(--text-muted);">No se detectan gasolineras o tiendas 24h compatibles en un radio de 10km.</p>`;
                                return;
                            }

                            // Renderizamos los 4 locales comerciales más cercanos reales
                            tiendasEncontradas.slice(0, 4).forEach(t => {
                                const distTxt = t.dist < 1 ? `${Math.round(t.dist * 1000)} metros` : `${t.dist.toFixed(1)} km`;
                                let etiquetaComercio = "🏪 Establecimiento comercial";
                                if (t.tipo === 'fuel') etiquetaComercio = "⛽ Gasolinera (Abierta de noche)";
                                if (t.tipo === 'convenience') etiquetaComercio = "🏪 Tienda 24h / Conveniencia";

                                const div = document.createElement('div');
                                div.className = 'shop-card';
                                div.innerHTML = `
                                    <div class="shop-header">
                                        <h5 class="shop-title">${t.name}</h5>
                                        <span class="badge-open">Abierto</span>
                                    </div>
                                    <p style="margin:6px 0 0; font-size:13px; color:white;">📍 A <strong>${distTxt}</strong> de ti</p>
                                    <p style="margin:2px 0 0; font-size:11px; color:var(--text-muted);">${etiquetaComercio}</p>
                                    <p style="margin:6px 0 0; font-size:11px; color:#94a3b8; border-top:1px solid rgba(255,255,255,0.05); padding-top:4px;">🗺️ ${t.calle}</p>
                                `;
                                lista.appendChild(div);
                            });
                        })
                        .catch(() => { 
                            loader.style.display = 'none'; 
                            lista.innerHTML = '<p style="text-align:center;color:red;">Error de conexión con la red de mapas.</p>';
                        });
                },
                () => { 
                    loader.style.display = 'none'; 
                    alert("Es necesario dar permisos de GPS para medir la distancia exacta."); 
                }
            );
        }
    </script>
</body>
</html>
